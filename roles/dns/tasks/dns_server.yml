---
- name: Configure named service
  block:
  - name: Install DNS packages
    ansible.builtin.package:
      name:
        - bind
        - bind-utils
      state: present

  - name: Enable and start named
    ansible.builtin.service:
      name: named
      enabled: true
      state: started

  - name: Allow named to listen on necessary IPv4 interfaces
    ansible.builtin.replace:
      path: "{{ named_path }}"
      regexp: 'listen-on\s*port\s*53\s*\{.*\};'
      replace: 'listen-on port 53 { 127.0.0.1; {{ ansible_host }}; };'

  - name: Allow whole network to query DNS
    ansible.builtin.replace:
      path: "{{ named_path }}"
      regexp: 'allow-query\s*\{.*\};'
      replace: 'allow-query { localhost; {{ network_mask }}; };'

  - name: Setup DNS as authoritative
    ansible.builtin.replace:
      path: "{{ named_path }}"
      regexp: 'recursion.*;'
      replace: 'recursion no;'

  - name: Add zone definition
    ansible.builtin.blockinfile:
      path: "{{ zones_path }}"
      block: |
        zone "{{ company_domain }}" IN {
            type master;
            file "{{ company_domain }}.zone";
        };

  - name: Deploy zone file
    ansible.builtin.template:
      src: "{{ zone_def_j2 }}"
      dest: "{{ zone_def_path }}"
      owner: named
      group: named
      mode: '0640'
      setype: named_zone_t
  notify: Restart named

- name: Open DNS ports
  ansible.posix.firewalld:
    service: dns
    permanent: true
    state: enabled
    immediate: true
