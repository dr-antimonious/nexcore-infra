---
- name: Configure sudo access
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item.username }}"
    content: "{{ item.username }} ALL=(ALL) NOPASSWD: ALL\n"
    owner: root
    group: root
    mode: '0440'
    validate: "/usr/sbin/visudo -cf %s"
  loop: "{{ users }}"
  when: item.sudo | default(false)
  register: sudo_report

- name: Get users who can use sudo
  ansible.builtin.set_fact:
    granted_sudo: >-
      {{
        sudo_report.results
        | selectattr('changed', 'equalto', true)
        | map(attribute='item.username')
        | list
      }}

- name: Accumulate granted sudo into report
  ansible.builtin.set_fact:
    run_report: >-
      {{
        run_report | default({}) |
        combine(
          {
            'sudo': {
              'granted': granted_sudo,
              'count': granted_sudo | length
            }
          },
          recursive=True
        )
      }}
  when: granted_sudo | length > 0
